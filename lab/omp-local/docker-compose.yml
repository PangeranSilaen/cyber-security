services:
  db:
    image: mariadb:10.5
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_general_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: ./app
      args:
        OMP_VERSION: ${OMP_VERSION}
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OMP_BASE_URL: ${OMP_BASE_URL}
      OMP_ALLOWED_HOSTS: ${OMP_ALLOWED_HOSTS}
      OMP_ADMIN_USER: ${OMP_ADMIN_USER}
      OMP_ADMIN_PASSWORD: ${OMP_ADMIN_PASSWORD}
      OMP_ADMIN_EMAIL: ${OMP_ADMIN_EMAIL}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_state:/var/www/local
      - files_data:/var/www/files
      - public_data:/var/www/html/public

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${OMP_HTTP_PORT}:80"
    volumes:
      - ./web/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./mirror:/usr/share/nginx/html/mirror:ro

volumes:
  db_data:
  app_state:
  files_data:
  public_data:
